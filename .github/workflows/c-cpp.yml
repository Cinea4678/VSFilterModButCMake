name: C/C++ CI

on: [push]

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [Win32, x64]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release
    - name: Prepare artifacts
      shell: cmd
      run: |
        mkdir dist
        copy build\src\vsfilter\Release\VSFilterMod.dll dist\VSFilterMod.dll
        copy build\src\plugins\Release\vsfiltermod.dll dist\vsfiltermod_plugin.dll
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VSFilterMod_${{ matrix.arch }}
        path: dist

  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype-dev libharfbuzz-dev libfontconfig-dev
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release
    - name: Prepare artifacts
      run: |
        mkdir -p dist
        cp build/src/plugins/vsfiltermod.so dist/
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VSFilterMod_Linux_x64
        path: dist

  build-macos:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install dependencies
      run: |
        brew install freetype harfbuzz fontconfig pkg-config vapoursynth
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release
    - name: Prepare artifacts
      run: |
        mkdir -p dist
        cp build/src/plugins/vsfiltermod.dylib dist/
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VSFilterMod_macOS_arm64
        path: dist
